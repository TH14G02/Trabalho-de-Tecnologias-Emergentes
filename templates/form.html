{% extends "base.html" %} {% block conteudo %}
<div class="barra-secao">
  <h2>{% if jogo %}Editar jogo{% else %}Novo jogo{% endif %}</h2>
</div>

<form
  class="formulario"
  method="post"
  action="{% if jogo %}/jogos/{{ jogo.id }}/editar{% else %}/jogos{% endif %}"
>
  <label>
    Titulo
    <input
      type="text"
      name="titulo"
      value="{{ jogo.titulo if jogo else '' }}"
      required
    />
  </label>

  <label>
    Produtor
    <input
      type="text"
      name="produtor"
      value="{{ jogo.produtor if jogo else '' }}"
      required
    />
  </label>

  <label>
    Ano de lançamento
    <input
      type="number"
      name="ano"
      value="{{ jogo.ano if jogo else '' }}"
      required
    />
  </label>

  <label>
    Gênero
    <select name="genero_id" required>
        {% for g in generos %}
        <option
            value="{{ g.id }}"
            {% if jogo and jogo.genero_id == g.id %}selected{% endif %}
        >
            {{ g.nome }}
        </option>
        {% endfor %}
    </select>
</label>

  <label>
    Nota (0 - 10)
    <input
      type="number"
      step="0.1"
      min="0"
      max="10"
      name="nota"
      value="{{ jogo.nota if jogo else 0 }}"
    />
  </label>

  <label class="checkbox">
    <input
      type="checkbox"
      name="jogado"
      {%
      if
      jogo
      and
      jogo.jogado
      %}checked{%
      endif
      %}
    />
    Jogado
  </label>
  <label>
  Imagem
    <input
      type="text"
      name="imagem"
      value="{{ jogo.imagem if jogo else '' }}"

    />
  <button class="btn btn-editar" type="submit">Salvar</button>
  </label>
</form>
{% endblock %}
